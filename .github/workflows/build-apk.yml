name: АДЕМИ ТВ – APK bauen

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Dateien laden
        uses: actions/checkout@v4

      - name: Projekt entpacken
        shell: bash
        run: |
          ZIP_DATEI="$(find . -maxdepth 1 -type f -name '*.zip' | head -n 1)"
          test -n "$ZIP_DATEI"
          mkdir -p extracted
          unzip -q "$ZIP_DATEI" -d extracted
          SETTINGS_DATEI="$(find extracted -type f -name settings.gradle | head -n 1)"
          test -n "$SETTINGS_DATEI"
          PROJEKT_ORDNER="$(dirname "$SETTINGS_DATEI")"
          echo "PROJECT_DIR=$PROJEKT_ORDNER" >> "$GITHUB_ENV"

      - name: Java 17 einrichten
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Android einrichten
        uses: android-actions/setup-android@v3

      - name: Android-Pakete installieren
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Gradle einrichten
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: АДЕМИ ТВ bauen
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --stacktrace

      - name: APK vorbereiten
        shell: bash
        run: |
          cp "$PROJECT_DIR/app/build/outputs/apk/debug/app-debug.apk" ADEMI-TV.apk

      - name: APK zum Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: ADEMI-TV-APK
          path: ADEMI-TV.apk
          if-no-files-found: error
